{% extends 'base.html' %}
{% load static %}

{% block head_title %}page{% endblock head_title %}

{% block content %}
<div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="8" fill="#22C55E"/>
                        <path d="M10 15L20 25L30 15" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">DaTARA</span>
            </div>
            <h1 class="form-title">Application Form</h1>
        </header>

        <!-- Step Navigation -->
        <nav class="step-nav">
            <button class="step-btn active" data-step="1">Partner Organization</button>
            <button class="step-btn" data-step="2">Personal Information</button>
            <button class="step-btn" data-step="3">Address</button>
            <button class="step-btn" data-step="4">Education</button>
            <button class="step-btn" data-step="5">Interests</button>
            <button class="step-btn" data-step="6">Demographic</button>
            <button class="step-btn" data-step="7">Confirmation</button>
        </nav>

        <!-- Form Content -->
        <main class="form-content" id="form-container">
            <!-- Steps will be dynamically loaded here -->
        </main>

        <!-- Navigation Buttons -->
        <div class="form-navigation">
            <button type="button" class="nav-btn back-btn" id="back-btn">Back</button>
            <button type="button" class="nav-btn next-btn" id="next-btn">Next</button>
            <button type="submit" class="nav-btn submit-btn" id="submit-btn" style="display: none;">Submit</button>
        </div>
{% endblock content %}
