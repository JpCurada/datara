{% extends 'base.html' %}
{% load static %}

{% block head_title %}Application Form{% endblock head_title %}

{% block content %}
<!-- Step 4: Education -->
<div class="step-content" id="step-4">
    <div class="step-header">
        <h2>Education Information</h2>
    </div>

    <div class="form-section">
        <h3>Education Status</h3>
        <div class="radio-group vertical">
            <input type="radio" id="currently-enrolled" name="education-status" value="currently-enrolled" checked>
            <label for="currently-enrolled">Currently Enrolled</label>
            
            <input type="radio" id="fresh-graduate" name="education-status" value="fresh-graduate">
            <label for="fresh-graduate">Fresh Graduate (within 2 years)</label>
            
            <input type="radio" id="graduate" name="education-status" value="graduate">
            <label for="graduate">Graduate (more than 2 years ago)</label>
            
            <input type="radio" id="gap-year" name="education-status" value="gap-year">
            <label for="gap-year">Taking a gap year/break from university</label>
        </div>
    </div>

    <div class="form-section">
        <div class="education-grid">
            <div class="input-group">
                <label for="university-city">University/College City</label>
                <input type="text" id="university-city" name="university-city" value="MANILA" readonly>
            </div>
            <div class="input-group">
                <label for="university-name">University/College Name</label>
                <select id="university-name" name="university-name">
                    <option value="POLYTECHNIC UNIVERSITY OF THE PHILIPPINES - MANILA">POLYTECHNIC UNIVERSITY OF THE PHILIPPINES - MANILA</option>
                </select>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
