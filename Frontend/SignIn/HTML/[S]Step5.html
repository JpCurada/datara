<!-- Step 5: Interests -->
<div class="step-content" id="step-5">
    <div class="step-header">
        <h2>Interests</h2>
    </div>

    <div class="form-section">
        <div class="interests-grid">
            <div class="interest-group">
                <h3>Programming Experience Level</h3>
                <div class="radio-group vertical">
                    <input type="radio" id="prog-none" name="programming-level" value="none" checked>
                    <label for="prog-none">None</label>
                    
                    <input type="radio" id="prog-beginner" name="programming-level" value="beginner">
                    <label for="prog-beginner">Beginner</label>
                    
                    <input type="radio" id="prog-basic" name="programming-level" value="basic">
                    <label for="prog-basic">Basic</label>
                    
                    <input type="radio" id="prog-advanced" name="programming-level" value="advanced">
                    <label for="prog-advanced">Advanced</label>
                </div>
            </div>

            <div class="interest-group">
                <h3>Weekly Time Commitment</h3>
                <div class="radio-group vertical">
                    <input type="radio" id="time-1-2" name="time-commitment" value="1-2" checked>
                    <label for="time-1-2">1-2 hours</label>
                    
                    <input type="radio" id="time-3-5" name="time-commitment" value="3-5">
                    <label for="time-3-5">3-5 hours</label>
                    
                    <input type="radio" id="time-6-10" name="time-commitment" value="6-10">
                    <label for="time-6-10">6-10 hours</label>
                    
                    <input type="radio" id="time-11-15" name="time-commitment" value="11-15">
                    <label for="time-11-15">11-15 hours</label>
                    
                    <input type="radio" id="time-16+" name="time-commitment" value="16+">
                    <label for="time-16+">16+ hours</label>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Data Science Experience Level</h3>
            <div class="radio-group vertical">
                <input type="radio" id="ds-none" name="data-science-level" value="none" checked>
                <label for="ds-none">None</label>
                
                <input type="radio" id="ds-beginner" name="data-science-level" value="beginner">
                <label for="ds-beginner">Beginner</label>
                
                <input type="radio" id="ds-basic" name="data-science-level" value="basic">
                <label for="ds-basic">Basic</label>
                
                <input type="radio" id="ds-advanced" name="data-science-level" value="advanced">
                <label for="ds-advanced">Advanced</label>
            </div>
        </div>

        <div class="text-areas">
            <div class="input-group">
                <label for="scholarship-reason">Why do you want this scholarship? (1000 characters)</label>
                <textarea id="scholarship-reason" name="scholarship-reason" maxlength="1000" placeholder="For clout."></textarea>
            </div>

            <div class="input-group">
                <label for="career-goals">What are your career goals? (500 characters)</label>
                <textarea id="career-goals" name="career-goals" maxlength="500" placeholder="To pass the project."></textarea>
            </div>
        </div>
    </div>
</div>
