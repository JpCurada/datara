<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoA Submission</title>
    <link href="/Scholar/SignIn/CSS/[S]MoASub.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="main-heading">
            To complete your application journey, kindly upload your Memorandum of Agreement (MoA)
        </h1>

        <!-- File Upload Button -->
        <div class="upload-button-wrapper">
            <input type="file" id="moa-upload" accept=".pdf" class="file-input" />
            <label for="moa-upload" class="upload-label">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Upload File
            </label>
        </div>

        <p class="requirements-text">
            Maximum of 5 MB. Must be in PDF!
        </p>

        <div id="message-box" class="message-box">
            <span id="message-text"></span>
            <button onclick="document.getElementById('message-box').classList.remove('show')" class="message-box-close">X</button>
        </div>
    </div>
    <script src="/Scholar/SignIn/JS/MoASub.js"></script>
</body>
</html>
