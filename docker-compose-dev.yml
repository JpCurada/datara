services:

  web:
    image: johnpaulcurada/datara:latest
    env_file: env/web
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - 8000:8000
    depends_on:
      - db
    volumes:
      - ./src:/app
      - ./volume:/volume
      - ./staticfiles:/staticfiles

  db:
    image: postgres:16
    env_file: env/db
    restart: always
    ports:
      - 5434:5432
    volumes:
      - ./volume/data/db:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: johncurada.02@gmail.com
      PGADMIN_DEFAULT_PASSWORD: datara1234#
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
