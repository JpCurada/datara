services:

  web:
    image: johnpaulcurada/datara:latest
    env_file: env/web
    working_dir: /app
    command: python -m gunicorn --bind :8000 --workers 4 --access-logfile - --access-logformat '%({x-forwarded-for}i)s %(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s "%(f)s" "%(a)s" "%(M)s"' main.wsgi:application
    ports:
      - 8000:8000
    depends_on:
      - db
    volumes:
      - ./volume:/volume
      - ./staticfiles:/staticfiles

  db:
    image: postgres:16
    env_file: env/db
    restart: always
    ports:
      - 5432:5432
    volumes:
      - ./volume/data/db:/var/lib/postgresql/data
